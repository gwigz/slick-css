<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slick CSS</title>
    <link rel="stylesheet" href="slick.min.css" />
    <style>
      body {
        padding: 3rem 1.5rem;
      }

      pre {
        white-space: pre;
        tab-size: 2;
      }

      pre code {
        display: block;
        line-height: 1.6;
        color: var(--muted-foreground);
      }
    </style>
  </head>
  <body>
    <div stack="2xl" max-w="xl" style="margin: 0 auto">
      <!-- Header -->
      <header stack>
        <h1>Slick CSS</h1>
        <p>
          Classless CSS components inspired by shadcn/ui. Drop in a stylesheet, write semantic HTML, and get beautiful
          dark-mode components with zero classes.
        </p>
        <pre><code>&lt;link rel="stylesheet" href="https://unpkg.com/slick-css"&gt;</code></pre>
        <pre><code>npm install slick-css</code></pre>
      </header>

      <!-- Theme Switcher -->

      <!-- Component Sections -->

      <!-- Footer -->
      <footer>
        <p><a href="https://github.com/gwigz/slick-css">GitHub</a></p>
      </footer>
    </div>
  </body>
</html>
