<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slick CSS</title>
    <link rel="stylesheet" href="slick.min.css" />
    <style>
      body {
        padding: 3rem 1.5rem;
      }

      pre {
        white-space: pre;
        tab-size: 2;
      }

      pre code {
        display: block;
        line-height: 1.6;
        color: var(--muted-foreground);
      }
    </style>
  </head>
  <body>
    <div stack="2xl" max-w="xl" style="margin: 0 auto">
      <!-- Header -->
      <header stack>
        <h1>Slick CSS</h1>
        <p>
          Classless CSS components inspired by shadcn/ui. Drop in a stylesheet, write semantic HTML, and get beautiful
          dark-mode components with zero classes.
        </p>
        <pre><code>&lt;link rel="stylesheet" href="https://unpkg.com/slick-css"&gt;</code></pre>
        <pre><code>npm install slick-css</code></pre>
      </header>

      <!-- Theme Switcher -->
      <section stack>
        <div row style="align-items: center; gap: 0.75rem">
          <label style="font-size: 0.875rem; font-weight: 500">Theme</label>
          <div row style="gap: 0.375rem">
            <button
              data-theme="zinc"
              aria-label="Zinc theme"
              style="
                background: oklch(92.2% 0 0deg);
                width: 1.5rem;
                height: 1.5rem;
                border-radius: 9999px;
                border: 2px solid transparent;
                padding: 0;
              "
            ></button>
            <button
              data-theme="blue"
              aria-label="Blue theme"
              style="
                background: oklch(0.593 0.204 264.376);
                width: 1.5rem;
                height: 1.5rem;
                border-radius: 9999px;
                border: 2px solid transparent;
                padding: 0;
              "
            ></button>
            <button
              data-theme="green"
              aria-label="Green theme"
              style="
                background: oklch(0.627 0.164 164.36);
                width: 1.5rem;
                height: 1.5rem;
                border-radius: 9999px;
                border: 2px solid transparent;
                padding: 0;
              "
            ></button>
            <button
              data-theme="rose"
              aria-label="Rose theme"
              style="
                background: oklch(0.645 0.246 16.439);
                width: 1.5rem;
                height: 1.5rem;
                border-radius: 9999px;
                border: 2px solid transparent;
                padding: 0;
              "
            ></button>
            <button
              data-theme="orange"
              aria-label="Orange theme"
              style="
                background: oklch(0.69 0.204 70.746);
                width: 1.5rem;
                height: 1.5rem;
                border-radius: 9999px;
                border: 2px solid transparent;
                padding: 0;
              "
            ></button>
            <button
              data-theme="violet"
              aria-label="Violet theme"
              style="
                background: oklch(0.627 0.265 303.9);
                width: 1.5rem;
                height: 1.5rem;
                border-radius: 9999px;
                border: 2px solid transparent;
                padding: 0;
              "
            ></button>
          </div>
        </div>
        <div row style="align-items: center; gap: 0.75rem">
          <label style="font-size: 0.875rem; font-weight: 500">Radius</label>
          <div row style="gap: 0.375rem">
            <button ghost data-radius="0" style="font-size: 0.75rem">0</button>
            <button ghost data-radius="0.375rem" style="font-size: 0.75rem">S</button>
            <button ghost data-radius="0.625rem" style="font-size: 0.75rem">M</button>
            <button ghost data-radius="0.875rem" style="font-size: 0.75rem">L</button>
            <button ghost data-radius="1.25rem" style="font-size: 0.75rem">XL</button>
          </div>
        </div>
      </section>

      <!-- Component Sections -->

      <!-- Footer -->
      <footer>
        <p><a href="https://github.com/gwigz/slick-css">GitHub</a></p>
      </footer>
    </div>

    <script>
      const themes = {
        zinc: null,
        blue: {
          "--primary": "oklch(0.593 0.204 264.376)",
          "--primary-foreground": "oklch(0.98 0.016 263.684)",
          "--ring": "oklch(0.593 0.204 264.376)",
        },
        green: {
          "--primary": "oklch(0.627 0.164 164.36)",
          "--primary-foreground": "oklch(0.98 0.016 166.105)",
          "--ring": "oklch(0.627 0.164 164.36)",
        },
        rose: {
          "--primary": "oklch(0.645 0.246 16.439)",
          "--primary-foreground": "oklch(0.969 0.015 12.422)",
          "--ring": "oklch(0.645 0.246 16.439)",
        },
        orange: {
          "--primary": "oklch(0.69 0.204 70.746)",
          "--primary-foreground": "oklch(0.985 0.008 70.746)",
          "--ring": "oklch(0.69 0.204 70.746)",
        },
        violet: {
          "--primary": "oklch(0.627 0.265 303.9)",
          "--primary-foreground": "oklch(0.98 0.016 303.684)",
          "--ring": "oklch(0.627 0.265 303.9)",
        },
      };

      const root = document.documentElement;
      const themeButtons = document.querySelectorAll("[data-theme]");
      const radiusButtons = document.querySelectorAll("[data-radius]");

      function setActiveTheme(name) {
        const vars = themes[name];

        if (vars === null) {
          root.style.removeProperty("--primary");
          root.style.removeProperty("--primary-foreground");
          root.style.removeProperty("--ring");
        } else {
          Object.entries(vars).forEach(([prop, value]) => {
            root.style.setProperty(prop, value);
          });
        }

        themeButtons.forEach((btn) => {
          if (btn.dataset.theme === name) {
            btn.style.border = "2px solid var(--primary)";
          } else {
            btn.style.border = "2px solid transparent";
          }
        });
      }

      function setActiveRadius(value) {
        root.style.setProperty("--radius", value);

        radiusButtons.forEach((btn) => {
          if (btn.dataset.radius === value) {
            btn.style.outline = "2px solid var(--primary)";
            btn.style.outlineOffset = "2px";
          } else {
            btn.style.outline = "none";
            btn.style.outlineOffset = "0";
          }
        });
      }

      themeButtons.forEach((btn) => {
        btn.addEventListener("click", () => setActiveTheme(btn.dataset.theme));
      });

      radiusButtons.forEach((btn) => {
        btn.addEventListener("click", () => setActiveRadius(btn.dataset.radius));
      });

      // Set defaults on page load
      setActiveTheme("zinc");
      setActiveRadius("0.625rem");
    </script>
  </body>
</html>
